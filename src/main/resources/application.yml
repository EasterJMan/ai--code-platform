spring:
  application:
    name: ai-code-platform
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/aicodeplateform
    username: root
    password: root
  profiles:
    active: local
  # redis
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: root
      ttl: 3600
  # session 配置
  session:
    store-type: redis
    # session 30 天过期
    timeout: 2592000

server:
  port: 8123
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000

# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.jzy.aicodeplatform.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

app:
  screenshot:
    mq-enabled: false
    topic: screenshot-topic
    tag: generate
    consumer-group: screenshot-consumer-group
    max-retry: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
