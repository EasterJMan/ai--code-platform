spring:
  application:
    name: ai-code-platform
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/aicodeplateform
    username: root
    password: root
  profiles:
    active: local
server:
  port: 8123
  servlet:
    context-path: /api

# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.jzy.aicodeplatform.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.minimaxi.com/v1
      api-key: <Your API Key>
      model-name: MiniMax-M2.5
      log-requests: true
      log-responses: true
      max-tokens: 10000
#      strict-json-schema: true
#      response-format: json_object
    streaming-chat-model:
      base-url:https://api.minimaxi.com/v1
      api-key: <Your API Key>
      model-name: deepseek-chat
      max-tokens: 8192
      log-requests: true
      log-responses: true
